name: xtask

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clippy aarch64
        run: cargo xtask clippy --arch aarch64 --verbose
      - name: Clippy riscv64
        run: cargo xtask clippy --arch riscv64 --verbose
      - name: Clippy x86-64
        run: cargo xtask clippy --arch x86-64 --verbose
      - name: Check
        run: cargo xtask check --verbose

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run tests
        run: cargo xtask test --verbose

  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: cargo xtask build --arch x86-64 --verbose

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: cargo xtask build --arch aarch64 --verbose

  build-riscv64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: cargo xtask build --arch riscv64 --verbose
